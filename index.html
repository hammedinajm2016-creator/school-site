```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>تعلم اليوم وابدع غدا</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: Tahoma, sans-serif;
            background:
                linear-gradient(rgba(219, 234, 254, 0.85),
                    rgba(191, 219, 254, 0.85)),
                url('https://images.unsplash.com/photo-1588072432836-e10032774350?q=80&w=1920&auto=format&fit=crop');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden text-gray-800">

    <!-- HEADER -->

    <header class="bg-white/95 shadow-xl sticky top-0 z-50 backdrop-blur-md">

        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-4">

            <div class="text-5xl">
                📚
            </div>

            <div>

                <h1 class="text-3xl font-extrabold text-blue-700">
                    تعلم اليوم وابدع غدا
                </h1>

                <p class="text-gray-500">
                    منصة تعليمية للتعليم الابتدائي
                </p>

            </div>
        </div>
    </header>

    <!-- SUBJECT BUTTONS -->

    <div class="fixed right-4 top-32 z-50 flex flex-col gap-4">

        <button onclick="toggleSubject('math')"
            class="w-72 h-24 bg-pink-500 hover:bg-pink-600 text-white rounded-3xl text-3xl font-extrabold shadow-2xl transition">

            📘 الرياضيات

        </button>

        <button onclick="toggleSubject('arabic')"
            class="w-72 h-24 bg-yellow-500 hover:bg-yellow-600 text-white rounded-3xl text-3xl font-extrabold shadow-2xl transition">

            📖 العربية

        </button>

        <button onclick="toggleSubject('science')"
            class="w-72 h-24 bg-cyan-500 hover:bg-cyan-600 text-white rounded-3xl text-3xl font-extrabold shadow-2xl transition">

            🧪 العلوم

        </button>

        <button onclick="toggleSubject('french')"
            class="w-72 h-24 bg-green-500 hover:bg-green-600 text-white rounded-3xl text-3xl font-extrabold shadow-2xl transition">

            🗼 الفرنسية

        </button>

    </div>

    <!-- HERO -->

    <section class="relative h-[500px] overflow-hidden flex items-center justify-center rounded-b-[50px] shadow-2xl">

        <div id="heroBackground"
            class="absolute inset-0 bg-cover bg-center"
            style="background-image:url('https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=1920&auto=format&fit=crop');">
        </div>

        <div class="absolute inset-0 bg-blue-900/40"></div>

        <div class="relative z-10 text-center text-white px-6">

            <h1 class="text-6xl font-extrabold mb-6">
                تعلم اليوم وابدع غدا
            </h1>

            <p class="text-2xl mb-8">
                منصة تعليمية ممتعة للأطفال
            </p>

            <label
                class="bg-white text-blue-700 px-8 py-4 rounded-2xl text-xl font-bold shadow-2xl cursor-pointer inline-block">

                🎨 تغيير الخلفية

                <input type="file"
                    accept="image/*"
                    class="hidden"
                    onchange="changeHeroBackground(event)">

            </label>

        </div>
    </section>

    <!-- CONTENT -->

    <section id="subjectContent"
        class="hidden max-w-5xl mx-auto mt-10 mb-20 px-6">

        <div class="bg-white/95 rounded-[35px] shadow-2xl p-8">

            <h2 id="subjectTitle"
                class="text-4xl font-extrabold text-center text-blue-700 mb-10">

                المادة الدراسية

            </h2>

            <!-- LEVELS -->

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">

                <button onclick="toggleLevel('السنة الأولى')"
                    class="bg-cyan-500 text-white py-4 rounded-2xl font-bold">
                    🎓 السنة الأولى
                </button>

                <button onclick="toggleLevel('السنة الثانية')"
                    class="bg-cyan-500 text-white py-4 rounded-2xl font-bold">
                    🎓 السنة الثانية
                </button>

                <button onclick="toggleLevel('السنة الثالثة')"
                    class="bg-cyan-500 text-white py-4 rounded-2xl font-bold">
                    🎓 السنة الثالثة
                </button>

                <button onclick="toggleLevel('السنة الرابعة')"
                    class="bg-cyan-500 text-white py-4 rounded-2xl font-bold">
                    🎓 السنة الرابعة
                </button>

                <button onclick="toggleLevel('السنة الخامسة')"
                    class="bg-cyan-500 text-white py-4 rounded-2xl font-bold">
                    🎓 السنة الخامسة
                </button>

                <button onclick="toggleLevel('السنة السادسة')"
                    class="bg-cyan-500 text-white py-4 rounded-2xl font-bold">
                    🎓 السنة السادسة
                </button>

            </div>

            <!-- LEVEL CONTENT -->

            <div id="levelContent" class="hidden">

                <h3 id="levelTitle"
                    class="text-3xl font-extrabold text-cyan-700 text-center mb-8">
                </h3>

                <!-- UPLOAD BUTTONS -->

                <div class="grid md:grid-cols-3 gap-6 mb-10">

                    <label
                        class="bg-red-500 text-white py-5 rounded-2xl text-center cursor-pointer font-bold">

                        📄 رفع PDF

                        <input type="file"
                            accept=".pdf"
                            class="hidden"
                            onchange="showFileName(event)">

                    </label>

                    <label
                        class="bg-blue-500 text-white py-5 rounded-2xl text-center cursor-pointer font-bold">

                        📊 رفع PPT

                        <input type="file"
                            accept=".ppt,.pptx"
                            class="hidden"
                            onchange="showFileName(event)">

                    </label>

                    <label
                        class="bg-green-500 text-white py-5 rounded-2xl text-center cursor-pointer font-bold">

                        📝 رفع Word

                        <input type="file"
                            accept=".doc,.docx"
                            class="hidden"
                            onchange="showFileName(event)">

                    </label>

                </div>

                <!-- FILES -->

                <div id="uploadedFiles"
                    class="hidden bg-gray-50 rounded-3xl p-6 border border-gray-200">

                    <div class="flex justify-between items-center mb-5">

                        <h3 class="text-2xl font-extrabold text-emerald-600">
                            📚 الملفات المرفوعة
                        </h3>

                        <div
                            class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl font-bold">

                            📁 ملفات مرتبة

                        </div>

                    </div>

                    <div id="filesList" class="space-y-5">
                    </div>

                </div>

            </div>

        </div>
    </section>

    <!-- FOOTER -->

    <footer class="bg-gray-900 text-white py-8 text-center rounded-t-[40px]">

        © 2026 تعلم اليوم وابدع غدا

    </footer>

    <!-- SCRIPT -->

    <script>

        let currentSubject = null;
        let currentLevel = '';

        // SUBJECT

        function toggleSubject(subject) {

            currentSubject = subject;

            const names = {
                math: '📘 الرياضيات',
                arabic: '📖 العربية',
                science: '🧪 العلوم',
                french: '🗼 الفرنسية'
            };

            document
                .getElementById('subjectContent')
                .classList
                .remove('hidden');

            document
                .getElementById('subjectTitle')
                .innerText = names[subject];

            document
                .getElementById('levelContent')
                .classList
                .add('hidden');
        }

        // LEVEL

        function toggleLevel(level) {

            currentLevel = level;

            document
                .getElementById('levelContent')
                .classList
                .remove('hidden');

            document
                .getElementById('levelTitle')
                .innerText = level;
        }

        // CHANGE HERO BG

        function changeHeroBackground(event) {

            const file = event.target.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = e => {

                document
                    .getElementById('heroBackground')
                    .style
                    .backgroundImage =
                    `url('${e.target.result}')`;
            };

            reader.readAsDataURL(file);
        }

        // FILE UPLOAD

        async function showFileName(event) {

            const file = event.target.files[0];

            if (!file) return;

            if (!currentSubject) {
                alert('اختر المادة أولاً');
                return;
            }

            if (!currentLevel) {
                alert('اختر السنة الدراسية');
                return;
            }

            try {

                const formData = new FormData();

                formData.append('file', file);

                formData.append(
                    'upload_preset',
                    'school_upload'
                );

                const response = await fetch(
                    'https://api.cloudinary.com/v1_1/dl489hxuy/auto/upload',
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                const data = await response.json();

                console.log(data);

                if (!data.secure_url) {
                    alert('فشل رفع الملف');
                    return;
                }

                const fileURL = data.secure_url;

                const filesList =
                    document.getElementById('filesList');

                const uploadedFiles =
                    document.getElementById('uploadedFiles');

                uploadedFiles.classList.remove('hidden');

                const folderName =
                    `${currentSubject}-${currentLevel}`;

                let folder =
                    document.getElementById(folderName);

                if (!folder) {

                    folder = document.createElement('div');

                    folder.id = folderName;

                    folder.className =
                        'bg-blue-50 border-2 border-cyan-300 rounded-3xl p-5';

                    folder.innerHTML = `
                        <div class="flex items-center gap-3 border-b pb-3 mb-4">

                            <div class="text-5xl">
                                📁
                            </div>

                            <div>

                                <h4 class="text-2xl font-extrabold text-blue-700">
                                    ${currentLevel}
                                </h4>

                                <p class="text-gray-500">
                                    ${document.getElementById('subjectTitle').innerText}
                                </p>

                            </div>

                        </div>

                        <div class="folder-files space-y-4"></div>
                    `;

                    filesList.prepend(folder);
                }

                const folderFiles =
                    folder.querySelector('.folder-files');

                const fileItem =
                    document.createElement('div');

                fileItem.className =
                    'bg-white rounded-2xl shadow p-4 flex justify-between items-center';

                fileItem.innerHTML = `
                    <div>

                        <div class="font-bold text-lg">
                            ${file.name}
                        </div>

                        <div class="text-sm text-gray-500">
                            تم رفع الملف بنجاح
                        </div>

                    </div>

                    <div class="flex gap-2">

                        <a href="${fileURL}"
                            target="_blank"
                            class="bg-blue-500 text-white px-4 py-2 rounded-xl font-bold">

                            👁 فتح

                        </a>

                        <a href="${fileURL}"
                            download
                            class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold">

                            ⬇ تحميل

                        </a>

                    </div>
                `;

                folderFiles.prepend(fileItem);

                alert('تم رفع الملف بنجاح ✅');

            } catch (error) {

                console.error(error);

                alert('حدث خطأ أثناء رفع الملف');
            }
        }

    </script>

</body>

</html>
```
