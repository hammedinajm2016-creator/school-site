<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعلم اليوم وابدع غدا</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Tahoma', sans-serif;
      background-image:
        linear-gradient(rgba(219,234,254,0.78), rgba(191,219,254,0.78)),
        url('https://images.unsplash.com/photo-1588072432836-e10032774350?q=80&w=1920&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
  </style>
</head>

<body class="min-h-screen text-gray-800">

  <header class="bg-white/95 backdrop-blur-md shadow-xl sticky top-0 z-50 border-b border-white/40">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col lg:flex-row items-center justify-between gap-5">

      <div class="flex items-center gap-3">
        <div class="text-5xl">📚</div>

        <div>
          <h1 class="text-3xl font-extrabold text-blue-700">
            تعلم اليوم وابدع غدا
          </h1>

          <p class="text-gray-500 text-sm">
            منصة تعليمية للتعليم الابتدائي
          </p>
        </div>
      </div>

      <div class="fixed right-4 top-40 z-50 flex flex-col gap-6">

        <button onclick="toggleSubject('math')"
          class="w-72 h-24 rounded-r-[40px] rounded-l-[20px] bg-gradient-to-l from-pink-500 to-rose-400 text-white text-3xl font-extrabold shadow-2xl hover:scale-105 transition-all duration-300 relative overflow-hidden">
          📘 الرياضيات
        </button>

        <button onclick="toggleSubject('arabic')"
          class="w-72 h-24 rounded-r-[40px] rounded-l-[20px] bg-gradient-to-l from-yellow-500 to-amber-400 text-white text-3xl font-extrabold shadow-2xl hover:scale-105 transition-all duration-300 relative overflow-hidden">
          📖 العربية
        </button>

        <button onclick="toggleSubject('science')"
          class="w-72 h-24 rounded-r-[40px] rounded-l-[20px] bg-gradient-to-l from-cyan-500 to-sky-400 text-white text-3xl font-extrabold shadow-2xl hover:scale-105 transition-all duration-300 relative overflow-hidden">
          🧪 العلوم
        </button>

        <button onclick="toggleSubject('french')"
          class="w-72 h-24 rounded-r-[40px] rounded-l-[20px] bg-gradient-to-l from-green-500 to-emerald-400 text-white text-3xl font-extrabold shadow-2xl hover:scale-105 transition-all duration-300 relative overflow-hidden">
          🗼 الفرنسية
        </button>

      </div>
    </div>
  </header>

  <section id="heroSection" class="relative h-[500px] flex items-center justify-center overflow-hidden">

    <div class="absolute inset-0 bg-cover bg-center" id="heroBackground"
      style="background-image:url('https://images.unsplash.com/photo-1509062522246-3755977927d7?q=80&w=1920&auto=format&fit=crop');">
    </div>

    <div class="absolute inset-0 bg-blue-900/40 backdrop-blur-[2px]"></div>

    

    <div class="relative z-10 text-center text-white px-6">
      <h1 class="text-5xl md:text-7xl font-extrabold mb-6 drop-shadow-2xl">
        تعلم اليوم وابدع غدا
      </h1>

      <p class="text-2xl md:text-3xl font-bold mb-8">
        منصة تعليمية ممتعة للأطفال
      </p>

      <label class="bg-white text-blue-700 px-8 py-4 rounded-2xl text-xl font-bold shadow-2xl cursor-pointer hover:scale-105 transition-all duration-300 inline-block">
        🎨 تغيير الخلفية
        <input type="file" accept="image/*" class="hidden" onchange="changeHeroBackground(event)" />
      </label>
    </div>
  </section>

  

  

  <section id="subjectContent" class="hidden fixed right-[320px] top-44 w-[700px] z-50">

    <div class="bg-white/95 backdrop-blur-xl rounded-[35px] shadow-2xl p-8 border border-gray-100">

      <h2 id="subjectTitle"
        class="text-4xl font-extrabold text-center text-blue-700 mb-10">
      </h2>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">

        <button onclick="toggleLevel('السنة الأولى')"
          class="bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg">
          🎓 السنة الأولى
        </button>

        <button onclick="toggleLevel('السنة الثانية')"
          class="bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg">
          🎓 السنة الثانية
        </button>

        <button onclick="toggleLevel('السنة الثالثة')"
          class="bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg">
          🎓 السنة الثالثة
        </button>

        <button onclick="toggleLevel('السنة الرابعة')"
          class="bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg">
          🎓 السنة الرابعة
        </button>

        <button onclick="toggleLevel('السنة الخامسة')"
          class="bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg">
          🎓 السنة الخامسة
        </button>

        <button onclick="toggleLevel('السنة السادسة')"
          class="bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl text-lg font-bold shadow-lg">
          🎓 السنة السادسة
        </button>
      </div>

      <div id="levelContent" class="hidden">

        <h3 id="levelTitle"
          class="text-3xl font-extrabold text-cyan-700 text-center mb-8">
        </h3>

        <div class="grid md:grid-cols-3 gap-6 mb-10">

          <label class="bg-red-500 hover:bg-red-600 text-white py-5 rounded-2xl text-xl font-bold shadow-xl text-center cursor-pointer block">
            📄 رفع درس PDF
            <input type="file" accept=".pdf" class="hidden" onchange="showFileName(event)" />
          </label>

          <label class="bg-blue-500 hover:bg-blue-600 text-white py-5 rounded-2xl text-xl font-bold shadow-xl text-center cursor-pointer block">
            📊 رفع درس PPT
            <input type="file" accept=".ppt,.pptx" class="hidden" onchange="showFileName(event)" />
          </label>

          <label class="bg-green-500 hover:bg-green-600 text-white py-5 rounded-2xl text-xl font-bold shadow-xl text-center cursor-pointer block">
            📝 رفع درس Word
            <input type="file" accept=".doc,.docx" class="hidden" onchange="showFileName(event)" />
          </label>
        </div>

        <div id="mathButtons" class="hidden grid md:grid-cols-2 gap-6 mb-10">

          <button onclick="toggleMath('الحساب')"
            class="bg-indigo-500 hover:bg-indigo-600 text-white py-5 rounded-2xl text-2xl font-bold shadow-xl">
            ➕ الحساب
          </button>

          <button onclick="toggleMath('الهندسة')"
            class="bg-amber-500 hover:bg-amber-600 text-white py-5 rounded-2xl text-2xl font-bold shadow-xl">
            📐 الهندسة
          </button>
        </div>

        <div id="mathContent" class="hidden text-center">

          <h3 id="mathTitle"
            class="text-3xl font-extrabold text-purple-600 mb-6">
          </h3>

          <div class="grid md:grid-cols-3 gap-6">

            <label class="bg-red-500 hover:bg-red-600 text-white py-5 rounded-2xl text-xl font-bold shadow-xl text-center cursor-pointer block">
            📄 رفع درس PDF
            <input type="file" accept=".pdf" class="hidden" onchange="showFileName(event)" />
          </label>

            <label class="bg-blue-500 hover:bg-blue-600 text-white py-5 rounded-2xl text-xl font-bold shadow-xl text-center cursor-pointer block">
            📊 رفع درس PPT
            <input type="file" accept=".ppt,.pptx" class="hidden" onchange="showFileName(event)" />
          </label>

            <label class="bg-green-500 hover:bg-green-600 text-white py-5 rounded-2xl text-xl font-bold shadow-xl text-center cursor-pointer block">
            📝 رفع درس Word
            <input type="file" accept=".doc,.docx" class="hidden" onchange="showFileName(event)" />
          </label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-gray-900 text-white py-8 mt-10 text-center">
    <p class="text-lg font-semibold">
      © 2026 تعلم اليوم وابدع غدا - جميع الحقوق محفوظة
    </p>
  </footer>

  <script>
    let currentSubject = null;

    function toggleSubject(subject) {
      const section = document.getElementById('subjectContent');
      const title = document.getElementById('subjectTitle');
      const levelContent = document.getElementById('levelContent');
      const mathButtons = document.getElementById('mathButtons');
      const mathContent = document.getElementById('mathContent');

      if (currentSubject === subject) {
        section.classList.add('hidden');
        currentSubject = null;
        return;
      }

      currentSubject = subject;
      section.classList.remove('hidden');
      // تم تثبيت اللوحة بجانب المادة
      levelContent.classList.add('hidden');
      mathButtons.classList.add('hidden');
      mathContent.classList.add('hidden');

      const names = {
        math: '📘 الرياضيات',
        arabic: '📖 اللغة العربية',
        science: '🧪 الايقاظ العلمي',
        french: '🗼 اللغة الفرنسية'
      };

      title.innerText = names[subject];

      if (subject === 'math') {
        mathButtons.classList.remove('hidden');
      }
    }

    function toggleLevel(level) {
      const levelContent = document.getElementById('levelContent');
      const levelTitle = document.getElementById('levelTitle');

      levelContent.classList.toggle('hidden');
      levelTitle.innerText = '✨ ' + level;
    }

    function changeHeroBackground(event) {
      const file = event.target.files[0];

      if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
          document.getElementById('heroBackground').style.backgroundImage = `url('${e.target.result}')`;
        }

        reader.readAsDataURL(file);
      }
    }

    function showFileName(event) {
      const file = event.target.files[0];

      if (file) {
        alert('تم رفع الملف: ' + file.name);
      }
    }

    function toggleMath(section) {
      const mathContent = document.getElementById('mathContent');
      const mathTitle = document.getElementById('mathTitle');

      mathContent.classList.toggle('hidden');
      mathTitle.innerText = '✨ قسم ' + section;
    }
  </script>

</body>
</html>
